[loggers]
keys=root,mainLogger,systemCheckLogger,imageDownloadLogger,proxyManagerLogger

[handlers]
keys=consoleHandler,timedRotatingFileHandler

[formatters]
keys=defaultFormatter

[logger_root]
level=INFO
handlers=consoleHandler,timedRotatingFileHandler

[logger_mainLogger]
level=INFO
handlers=consoleHandler,timedRotatingFileHandler
qualname=main  # Logger for the main project

[logger_systemCheckLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=system_check  # Logger for the main project

[logger_proxyManagerLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=proxy_manager  # Logger specific to proxy_manager.py
# propagate=0  # Prevents propagating logs to root logger

[logger_imageDownloadLogger]
level=WARNING
handlers=consoleHandler,timedRotatingFileHandler
qualname=image_download  # Logger specific to proxy_manager.py
# propagate=0  # Prevents propagating logs to root logger

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=defaultFormatter
args=(sys.stdout,)

[handler_timedRotatingFileHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=defaultFormatter
args=('logs/app.log', 'midnight', 1, 30)  # Rotate at midnight, keep logs for 30 days

[formatter_defaultFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
