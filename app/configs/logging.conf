[loggers]
keys=root,mainLogger,systemCheckLogger,imageDownloadLogger,proxyManagerLogger,tokenManagerLogger,rootCategories,idsFetcher,productFetcher,brandsCrawler,saveLoad

[handlers]
keys=consoleHandler,timedRotatingFileHandler

[formatters]
keys=defaultFormatter

[logger_root]
level=INFO
handlers=consoleHandler,timedRotatingFileHandler

[logger_mainLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=main
propagate=0

[logger_systemCheckLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=system_check
propagate=0

[logger_proxyManagerLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=proxy_manager
propagate=0

[logger_tokenManagerLogger]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=token_manager
propagate=0

[logger_imageDownloadLogger]
level=INFO
handlers=consoleHandler,timedRotatingFileHandler
qualname=image_download
propagate=0

[logger_saveLoad]
level=INFO
handlers=consoleHandler,timedRotatingFileHandler
qualname=save_load
propagate=0

[logger_rootCategories]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=root_categories
propagate=0

[logger_idsFetcher]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=ids_fetcher
propagate=0

[logger_productFetcher]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=product_fetcher
propagate=0

[logger_brandsCrawler]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
qualname=brands_crawler
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=defaultFormatter
args=(sys.stdout,)

[handler_timedRotatingFileHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=defaultFormatter
args=('logs/app.log', 'midnight', 1, 30)

[formatter_defaultFormatter]  # Ensure this is correctly named
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
